<div class="slider-container" *ngIf="artworks.length > 0; else loading">
  <div class="slides-wrapper" (click)="handleSlideClick($event)">
    <div *ngFor="let art of artworks; let i = index" 
         class="slide" 
         [class.active]="i === currentIndex">
      <img class="slide-image" [src]="art.imageUrl" [alt]="art.thumbnail?.alt_text || art.title">
      
      <div class="slide-overlay"></div>
      
      <div class="slide-content fade-in" *ngIf="i === currentIndex">
        <h1 class="art-title">{{ art.title }}</h1>
        <h3 class="art-artist">{{ art.artist_display }}</h3>
        
        <div class="art-details">
          <p><span class="label">Date:</span> {{ art.date_display }}</p>
          <p><span class="label">Medium:</span> {{ art.medium_display }}</p>
          <a class="gallery-link"
             [routerLink]="['/gallery']"
             [queryParams]="{ artwork: art.id }"
             (click)="$event.stopPropagation()">
            View painting in gallery
          </a>
        </div>
      </div>

    </div>
  </div>
</div>

<ng-template #loading>
  <div class="loading-container">
    <div class="spinner"></div>
    <p>Curating gallery...</p>
  </div>
</ng-template>
